name: Bug report
description: Report defects, crashes, or unexpected behavior
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting! Please provide concise, reproducible information.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: One sentence describing the issue
      placeholder: When running X command, error Y occurs...
    validations:
      required: true
  - type: dropdown
    id: bug_type
    attributes:
      label: Bug type
      options:
        - Regression (worked before, now fails)
        - Crash (process/app exits or hangs)
        - Behavior bug (incorrect output/state without crash)
        - Security issue
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Install aish
        2. Run `aish run`
        3. Enter `; your prompt`
        4. Observe error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: AISH version
      placeholder: "0.1.0"
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: "Ubuntu 24.04 / Debian 12 / macOS"
    validations:
      required: true
  - type: dropdown
    id: install_method
    attributes:
      label: Install method
      options:
        - deb package
        - built from source
        - uv run
        - pip install
        - Other
    validations:
      required: true
  - type: input
    id: model
    attributes:
      label: AI Model / Provider
      placeholder: "gpt-4o / deepseek-chat / claude-3-sonnet"
  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: Relevant logs (~/.config/aish/logs/aish.log), remove sensitive info
      render: shell
  - type: textarea
    id: additional
    attributes:
      label: Additional information
