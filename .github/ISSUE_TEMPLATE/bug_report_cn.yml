name: Bug 反馈
description: 报告程序错误、崩溃或异常行为
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        感谢反馈问题！请提供简洁、可复现的信息。
  - type: textarea
    id: summary
    attributes:
      label: 问题描述
      description: 一句话描述遇到了什么问题
      placeholder: 执行某命令时出现错误...
    validations:
      required: true
  - type: dropdown
    id: bug_type
    attributes:
      label: 问题类型
      options:
        - 回归问题（以前正常，现在失败）
        - 崩溃问题（进程退出或卡死）
        - 行为错误（结果或状态错误，但未崩溃）
        - 安全问题
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: 复现步骤
      placeholder: |
        1. 安装 aish
        2. 执行命令 `aish run`
        3. 输入 `; 你的提示`
        4. 观察到错误
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: 期望行为
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: 实际行为
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: AISH 版本
      placeholder: "0.1.0"
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: 操作系统
      placeholder: "Ubuntu 24.04 / Debian 12 / macOS"
    validations:
      required: true
  - type: dropdown
    id: install_method
    attributes:
      label: 安装方式
      options:
        - deb 包
        - 源码编译
        - uv run
        - pip install
        - 其他
    validations:
      required: true
  - type: input
    id: model
    attributes:
      label: AI 模型 / 提供商
      placeholder: "gpt-4o / deepseek-chat / claude-3-sonnet"
  - type: textarea
    id: logs
    attributes:
      label: 日志信息
      description: 相关日志（~/.config/aish/logs/aish.log），请移除敏感信息
      render: shell
  - type: textarea
    id: additional
    attributes:
      label: 补充信息
