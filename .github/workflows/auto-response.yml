name: Auto response

on:
  issues:
    types: [opened, edited, reopened, labeled]
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, edited, reopened, labeled]

permissions: {}

jobs:
  auto-response:
    permissions:
      contents: read
      issues: write
      pull-requests: write
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Handle labeled items and comments
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { run } = require("./.github/scripts/auto-response.cjs");
            await run({ github, context, core });
