name: CI

on:
  pull_request:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  UV_CACHE_DIR: .uv-cache

jobs:
  lint-test:
    name: Lint and test
    runs-on: ubuntu-latest
    container:
      image: rockylinux:8
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up build environment
        run: ./packaging/scripts/setup-ci-env.sh

      - name: Sync development dependencies
        run: uv sync --group dev

      - name: Run lint
        run: make lint

      - name: Run tests
        run: make test

      - name: Build Python package
        run: make build

      - name: Upload Python package artifacts
        uses: actions/upload-artifact@v4
        with:
          name: python-package
          path: dist/*
          if-no-files-found: error

  build-bundle:
    name: Build bundle (${{ matrix.arch }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runs_on: ubuntu-latest
          - arch: arm64
            runs_on: ubuntu-24.04-arm
    runs-on: ${{ matrix.runs_on }}
    needs: lint-test
    container:
      image: rockylinux:8
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up build environment
        run: ./packaging/scripts/setup-ci-env.sh

      - name: Build bundle
        run: |
          VERSION="0.0.0+${GITHUB_SHA::8}"
          OUTPUT_DIR="artifacts/${{ matrix.arch }}"
          VERSION="$VERSION" ARCH="${{ matrix.arch }}" OUTPUT_DIR="$OUTPUT_DIR" ./packaging/build_bundle.sh
          tar -tf "$OUTPUT_DIR/aish-${VERSION}-linux-${{ matrix.arch }}.tar.gz" >/dev/null

      - name: Upload bundle artifacts
        uses: actions/upload-artifact@v4
        with:
          name: aish-bundle-${{ matrix.arch }}
          path: |
            artifacts/${{ matrix.arch }}/*
          if-no-files-found: error
