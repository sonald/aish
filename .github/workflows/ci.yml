name: CI

on:
  pull_request:
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

env:
  UV_CACHE_DIR: .uv-cache

jobs:
  changes:
    name: Detect changed areas
    runs-on: ubuntu-latest
    outputs:
      code: ${{ github.event_name == 'pull_request' && steps.filter.outputs.code || steps.default.outputs.code }}
      packaging: ${{ github.event_name == 'pull_request' && steps.filter.outputs.packaging || steps.default.outputs.packaging }}
    steps:
      - name: Default to full validation outside PRs
        id: default
        if: github.event_name != 'pull_request'
        run: |
          echo "code=true" >> "$GITHUB_OUTPUT"
          echo "packaging=true" >> "$GITHUB_OUTPUT"

      - name: Classify pull request changes
        id: filter
        if: github.event_name == 'pull_request'
        uses: dorny/paths-filter@v3
        with:
          filters: |
            code:
              - 'src/**'
              - 'tests/**'
              - 'main.py'
              - 'pyproject.toml'
              - 'Makefile'
              - 'build.sh'
              - '.github/workflows/ci.yml'
            packaging:
              - 'packaging/**'
              - 'debian/**'
              - 'config/**'
              - 'aish.spec'
              - '.github/workflows/ci.yml'
              - '.github/workflows/release.yml'
              - '.github/workflows/release-preparation.yml'

  lint-test:
    name: Lint and test
    needs: changes
    if: github.event_name != 'pull_request' || needs.changes.outputs.code == 'true' || needs.changes.outputs.packaging == 'true'
    runs-on: ubuntu-latest
    container:
      image: rockylinux:8
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up build environment
        run: ./packaging/scripts/setup-ci-env.sh

      - name: Sync development dependencies
        run: uv sync --group dev

      - name: Run lint
        run: make lint

      - name: Run tests
        run: make test

      - name: Build Python package
        run: make build

      - name: Upload Python package artifacts
        uses: actions/upload-artifact@v6
        with:
          name: python-package
          path: dist/*
          if-no-files-found: error

  cross-platform-smoke:
    name: Cross-platform smoke (${{ matrix.os }})
    needs:
      - changes
      - lint-test
    if: github.event_name != 'pull_request' || needs.changes.outputs.code == 'true' || needs.changes.outputs.packaging == 'true'
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
          - macos-latest
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Sync dependencies
        run: uv sync --group dev

      - name: Smoke test import
        run: |
          uv run python -c "import platform; import aish; print('ok', platform.system(), platform.machine())"

  build-bundle:
    name: Build bundle (${{ matrix.arch }})
    if: github.event_name != 'pull_request' || needs.changes.outputs.packaging == 'true'
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runs_on: ubuntu-latest
          - arch: arm64
            runs_on: ubuntu-24.04-arm
    runs-on: ${{ matrix.runs_on }}
    needs:
      - changes
      - lint-test
      - cross-platform-smoke
    container:
      image: rockylinux:8
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up build environment
        run: ./packaging/scripts/setup-ci-env.sh

      - name: Build bundle
        run: |
          VERSION="0.0.0+${GITHUB_SHA::8}"
          OUTPUT_DIR="artifacts/${{ matrix.arch }}"
          VERSION="$VERSION" PLATFORM="linux" ARCH="${{ matrix.arch }}" OUTPUT_DIR="$OUTPUT_DIR" ./packaging/build_bundle.sh
          tar -tf "$OUTPUT_DIR/aish-${VERSION}-linux-${{ matrix.arch }}.tar.gz" >/dev/null

      - name: Smoke test bundle install
        run: |
          VERSION="0.0.0+${GITHUB_SHA::8}"
          OUTPUT_DIR="artifacts/${{ matrix.arch }}"
          BUNDLE="aish-${VERSION}-linux-${{ matrix.arch }}"
          EXTRACT_DIR="$PWD/build/install-smoke/${{ matrix.arch }}"
          INSTALL_ROOT="$PWD/build/install-root/${{ matrix.arch }}"

          rm -rf "$EXTRACT_DIR" "$INSTALL_ROOT"
          mkdir -p "$EXTRACT_DIR" "$INSTALL_ROOT"

          tar -xzf "$OUTPUT_DIR/${BUNDLE}.tar.gz" -C "$EXTRACT_DIR"
          AISH_INSTALL_ROOT="$INSTALL_ROOT" AISH_SKIP_SYSTEMD=1 "$EXTRACT_DIR/${BUNDLE}/install.sh"

          test -x "$INSTALL_ROOT/usr/local/bin/aish"
          test -x "$INSTALL_ROOT/usr/local/bin/aish-sandbox"
          test -f "$INSTALL_ROOT/etc/aish/security_policy.yaml"
          test -f "$INSTALL_ROOT/etc/systemd/system/aish-sandbox.service"
          test -f "$INSTALL_ROOT/etc/systemd/system/aish-sandbox.socket"
          grep -q '^ExecStart=/usr/local/bin/aish-sandbox$' "$INSTALL_ROOT/etc/systemd/system/aish-sandbox.service"

      - name: Upload bundle artifacts
        uses: actions/upload-artifact@v6
        with:
          name: aish-linux-${{ matrix.arch }}
          path: |
            artifacts/${{ matrix.arch }}/*
          if-no-files-found: error
