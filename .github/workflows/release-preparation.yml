name: Release Preparation

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Target stable release version, for example 0.1.1"
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: release-preparation-${{ github.event.inputs.version }}
  cancel-in-progress: true

jobs:
  release-meta:
    name: Compute release metadata
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.metadata.outputs.version }}
      tag: ${{ steps.metadata.outputs.tag }}
      previous_stable_tag: ${{ steps.metadata.outputs.previous_stable_tag }}
      release_notes: ${{ steps.metadata.outputs.release_notes }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Compute release metadata
        id: metadata
        uses: ./.github/actions/release-metadata
        with:
          version: ${{ github.event.inputs.version }}
          artifact_prefix: release-preparation

  prepare-release:
    name: Summarize release preparation output
    needs: release-meta
    runs-on: ubuntu-latest
    outputs:
      version: ${{ needs.release-meta.outputs.version }}
      tag: ${{ needs.release-meta.outputs.tag }}
      previous_stable_tag: ${{ needs.release-meta.outputs.previous_stable_tag }}
    steps:
      - name: Write job summary
        run: |
          cat <<'EOF' >> "$GITHUB_STEP_SUMMARY"
          # Release Preparation Ready

          - Version: ${{ needs.release-meta.outputs.version }}
          - Tag: ${{ needs.release-meta.outputs.tag }}
          - Previous stable tag: ${{ needs.release-meta.outputs.previous_stable_tag || 'none' }}

          ## Release Notes

          ${{ needs.release-meta.outputs.release_notes }}
          EOF

  dry-run-package-validation:
    name: Dry-run package validation (${{ matrix.arch }})
    needs: release-meta
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runs_on: ubuntu-latest
          - arch: arm64
            runs_on: ubuntu-24.04-arm
    runs-on: ${{ matrix.runs_on }}
    container:
      image: rockylinux:8
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up build environment
        run: ./packaging/scripts/setup-ci-env.sh

      - name: Build bundle
        run: |
          VERSION="${{ needs.release-meta.outputs.version }}"
          OUTPUT_DIR="artifacts/${{ matrix.arch }}"
          VERSION="$VERSION" PLATFORM="linux" ARCH="${{ matrix.arch }}" OUTPUT_DIR="$OUTPUT_DIR" ./packaging/build_bundle.sh
          ls -lah "$OUTPUT_DIR"

      - name: Smoke test bundle install
        run: |
          VERSION="${{ needs.release-meta.outputs.version }}"
          OUTPUT_DIR="artifacts/${{ matrix.arch }}"
          BUNDLE="aish-${VERSION}-linux-${{ matrix.arch }}"
          EXTRACT_DIR="$PWD/build/install-smoke/${{ matrix.arch }}"
          INSTALL_ROOT="$PWD/build/install-root/${{ matrix.arch }}"

          rm -rf "$EXTRACT_DIR" "$INSTALL_ROOT"
          mkdir -p "$EXTRACT_DIR" "$INSTALL_ROOT"

          tar -xzf "$OUTPUT_DIR/${BUNDLE}.tar.gz" -C "$EXTRACT_DIR"
          AISH_INSTALL_ROOT="$INSTALL_ROOT" AISH_SKIP_SYSTEMD=1 "$EXTRACT_DIR/${BUNDLE}/install.sh"

          test -x "$INSTALL_ROOT/usr/local/bin/aish"
          test -x "$INSTALL_ROOT/usr/local/bin/aish-sandbox"
          test -f "$INSTALL_ROOT/etc/aish/security_policy.yaml"
          test -f "$INSTALL_ROOT/etc/systemd/system/aish-sandbox.service"
          test -f "$INSTALL_ROOT/etc/systemd/system/aish-sandbox.socket"
          grep -q '^ExecStart=/usr/local/bin/aish-sandbox$' "$INSTALL_ROOT/etc/systemd/system/aish-sandbox.service"

      - name: Upload dry-run artifacts
        uses: actions/upload-artifact@v6
        with:
          name: release-preparation-aish-linux-${{ matrix.arch }}
          path: artifacts/${{ matrix.arch }}/*
          if-no-files-found: error

  release-preparation-summary:
    name: Summarize release preparation validation
    needs:
      - release-meta
      - prepare-release
      - dry-run-package-validation
    runs-on: ubuntu-latest
    steps:
      - name: Write final summary
        run: |
          cat <<'EOF' >> "$GITHUB_STEP_SUMMARY"
          # Release Preparation Complete

          - Version: ${{ needs.release-meta.outputs.version }}
          - Tag: ${{ needs.release-meta.outputs.tag }}
          - Previous stable tag: ${{ needs.release-meta.outputs.previous_stable_tag || 'none' }}

          Release metadata artifacts and dry-run bundle artifacts have been uploaded for review.
          EOF