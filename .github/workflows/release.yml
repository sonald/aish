name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

env:
  UV_CACHE_DIR: .uv-cache

jobs:
  release-meta:
    name: Compute release metadata
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.metadata.outputs.version }}
      tag: ${{ steps.metadata.outputs.tag }}
      previous_stable_tag: ${{ steps.metadata.outputs.previous_stable_tag }}
      release_notes: ${{ steps.metadata.outputs.release_notes }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Verify tag commit is on main
        run: |
          git fetch origin main --depth=1
          git merge-base --is-ancestor "$GITHUB_SHA" origin/main

      - name: Compute release metadata
        id: metadata
        uses: ./.github/actions/release-metadata
        with:
          version: ${{ github.ref_name }}
          artifact_prefix: release

  release-gate:
    name: Release boundary checkpoint
    needs: release-meta
    runs-on: ubuntu-latest
    environment: release
    steps:
      - name: Confirm release payload
        run: |
          echo "Release ${RELEASE_TAG} is ready for bundle publishing."
        env:
          RELEASE_TAG: ${{ needs.release-meta.outputs.tag }}

  create-release:
    name: Create GitHub release
    needs:
      - release-meta
      - release-gate
    runs-on: ubuntu-latest
    steps:
      - name: Create release entry with generated notes
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.release-meta.outputs.tag }}
          name: aish ${{ needs.release-meta.outputs.tag }}
          generate_release_notes: true

  build-release-packages:
    name: Build release bundle (${{ matrix.arch }})
    needs:
      - release-meta
      - release-gate
      - create-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runs_on: ubuntu-latest
          - arch: arm64
            runs_on: ubuntu-24.04-arm
    runs-on: ${{ matrix.runs_on }}
    container:
      image: rockylinux:8
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up build environment
        run: ./packaging/scripts/setup-ci-env.sh

      - name: Build release bundle
        run: |
          VERSION="${{ needs.release-meta.outputs.version }}"
          OUTPUT_DIR="artifacts/${{ matrix.arch }}"
          VERSION="$VERSION" PLATFORM="linux" ARCH="${{ matrix.arch }}" OUTPUT_DIR="$OUTPUT_DIR" ./packaging/build_bundle.sh
          ls -lah "$OUTPUT_DIR"

      - name: Smoke test bundle install
        run: |
          VERSION="${{ needs.release-meta.outputs.version }}"
          OUTPUT_DIR="artifacts/${{ matrix.arch }}"
          BUNDLE="aish-${VERSION}-linux-${{ matrix.arch }}"
          EXTRACT_DIR="$PWD/build/install-smoke/${{ matrix.arch }}"
          INSTALL_ROOT="$PWD/build/install-root/${{ matrix.arch }}"

          rm -rf "$EXTRACT_DIR" "$INSTALL_ROOT"
          mkdir -p "$EXTRACT_DIR" "$INSTALL_ROOT"

          tar -xzf "$OUTPUT_DIR/${BUNDLE}.tar.gz" -C "$EXTRACT_DIR"
          AISH_INSTALL_ROOT="$INSTALL_ROOT" AISH_SKIP_SYSTEMD=1 "$EXTRACT_DIR/${BUNDLE}/install.sh"

          test -x "$INSTALL_ROOT/usr/local/bin/aish"
          test -x "$INSTALL_ROOT/usr/local/bin/aish-sandbox"
          test -f "$INSTALL_ROOT/etc/aish/security_policy.yaml"
          test -f "$INSTALL_ROOT/etc/systemd/system/aish-sandbox.service"
          test -f "$INSTALL_ROOT/etc/systemd/system/aish-sandbox.socket"
          grep -q '^ExecStart=/usr/local/bin/aish-sandbox$' "$INSTALL_ROOT/etc/systemd/system/aish-sandbox.service"

      - name: Upload assets to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.release-meta.outputs.tag }}
          files: artifacts/${{ matrix.arch }}/*

  release-summary:
    name: Summarize published release
    needs:
      - release-meta
      - build-release-packages
    runs-on: ubuntu-latest
    steps:
      - name: Write job summary
        run: |
          cat <<'EOF' >> "$GITHUB_STEP_SUMMARY"
          # Release Assets Published

          - Version: ${{ needs.release-meta.outputs.version }}
          - Tag: ${{ needs.release-meta.outputs.tag }}

          GitHub Release metadata was generated from the tag push, and bundle assets were uploaded successfully.
          EOF
