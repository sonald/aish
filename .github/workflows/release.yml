name: Release

on:
  release:
    types:
      - published

permissions:
  contents: write

env:
  UV_CACHE_DIR: .uv-cache

jobs:
  build-release-packages:
    name: Build release bundle (${{ matrix.arch }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runs_on: ubuntu-latest
          - arch: arm64
            runs_on: ubuntu-24.04-arm
    runs-on: ${{ matrix.runs_on }}
    container:
      image: rockylinux:8
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up build environment
        run: ./packaging/scripts/setup-ci-env.sh

      - name: Build release bundle
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          OUTPUT_DIR="artifacts/${{ matrix.arch }}"
          VERSION="$VERSION" ARCH="${{ matrix.arch }}" OUTPUT_DIR="$OUTPUT_DIR" ./packaging/build_bundle.sh
          ls -lah "$OUTPUT_DIR"

      - name: Upload assets to release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/${{ matrix.arch }}/*
