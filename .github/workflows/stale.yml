name: Stale

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

permissions: {}

jobs:
  stale:
    permissions:
      issues: write
      pull-requests: write
    runs-on: ubuntu-latest
    steps:
      - name: Mark stale issues and pull requests
        uses: actions/stale@v9
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          days-before-issue-stale: 14
          days-before-issue-close: 7
          days-before-pr-stale: 7
          days-before-pr-close: 5
          stale-issue-label: stale
          stale-pr-label: stale
          exempt-issue-labels: enhancement,feature-request,maintainer,pinned,security,no-stale,good first issue
          exempt-pr-labels: maintainer,no-stale,work-in-progress
          operations-per-run: 1000
          exempt-all-assignees: true
          remove-stale-when-updated: true
          stale-issue-message: |
            This issue has been automatically marked as stale due to inactivity.
            Please provide more details or update the issue, otherwise it will be closed in 7 days.
          stale-pr-message: |
            This pull request has been automatically marked as stale due to inactivity.
            Please update the PR or address the review comments, otherwise it will be closed in 5 days.
          close-issue-message: |
            Closing due to inactivity.
            If this is still an issue, please:
            1. Try the latest version of AISH
            2. Provide updated reproduction steps
            3. Open a new issue with fresh details
          close-pr-message: |
            Closing due to inactivity.
            If you believe this PR should be revived, please feel free to reopen it or create a new one.

  lock-closed-issues:
    permissions:
      issues: write
    runs-on: ubuntu-latest
    steps:
      - name: Lock closed issues after 30 days of no comments
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const lockAfterDays = 30;
            const lockAfterMs = lockAfterDays * 24 * 60 * 60 * 1000;
            const perPage = 100;
            const cutoffMs = Date.now() - lockAfterMs;
            const { owner, repo } = context.repo;

            let locked = 0;
            let inspected = 0;

            let page = 1;
            while (true) {
              const { data: issues } = await github.rest.issues.listForRepo({
                owner,
                repo,
                state: "closed",
                sort: "updated",
                direction: "desc",
                per_page: perPage,
                page,
              });

              if (issues.length === 0) {
                break;
              }

              for (const issue of issues) {
                // Skip PRs
                if (issue.pull_request) {
                  continue;
                }
                // Skip already locked
                if (issue.locked) {
                  continue;
                }
                if (!issue.closed_at) {
                  continue;
                }

                inspected += 1;
                const closedAtMs = Date.parse(issue.closed_at);
                if (!Number.isFinite(closedAtMs)) {
                  continue;
                }
                if (closedAtMs > cutoffMs) {
                  continue;
                }

                // Check last comment time
                let lastCommentMs = 0;
                if (issue.comments > 0) {
                  const { data: comments } = await github.rest.issues.listComments({
                    owner,
                    repo,
                    issue_number: issue.number,
                    per_page: 1,
                    page: 1,
                    sort: "created",
                    direction: "desc",
                  });

                  if (comments.length > 0) {
                    lastCommentMs = Date.parse(comments[0].created_at);
                  }
                }

                const lastActivityMs = Math.max(closedAtMs, lastCommentMs || 0);
                if (lastActivityMs > cutoffMs) {
                  continue;
                }

                await github.rest.issues.lock({
                  owner,
                  repo,
                  issue_number: issue.number,
                  lock_reason: "resolved",
                });

                locked += 1;
              }

              page += 1;
            }

            core.info(`Inspected ${inspected} closed issues; locked ${locked}.`);
