help:
  labels:
    usage: "Usage"
    options: "Options"
    examples: "Examples"
    notes: "Notes"
    brief_usage: "Usage: {usage}"

  general:
    title: "📖 AI Shell Help"
    markdown: |-
      ## Available Commands:

      ### Directory Navigation
      - `cd [-L|[-P [-e]]] [directory]` - Change directory with full parameter support
      - `pushd [directory]` - Push directory onto stack
      - `popd` - Pop directory from stack
      - `dirs [-c]` - Show directory stack

      ### History Management
      - `history [options] [n]` - Show command history
      - `history -c` - Clear history
      - `history -d offset` - Delete history entry

      ### Environment Variables
      - `export [-fn] [name[=value] ...]` - Set/export environment variables
      - `export -p` - Display exported variables
      - `unset [-fv] [name ...]` - Unset environment variables
      - `pwd [-L|-P]` - Print working directory

      ### General Commands
      - `help` - Show this help message
      - `clear` - Clear the screen
      - `exit` - Exit the shell
      - `/model [model]` - Show or switch model
      - `/setup` - Reconfigure API settings

      ### AI Commands
      - `; <question>` - Ask the AI assistant

      ### Features
      - ✅ Full PTY support for all commands
      - ✅ Command history and AI context integration
      - ✅ Rich terminal output for AI responses
      - ✅ Signal handling and graceful cleanup

      ### Getting Help
      Use `<command> --help` or `<command> -h` for detailed help on any command.

      ### Examples
      ```bash
      history --help       # Show detailed history help
      cd --help            # Show detailed cd help
      export JAVA_HOME="/usr/lib/jvm/java-11"  # Set environment variable
      unset TEMP_VAR       # Remove environment variable
      ; explain ls -la     # Ask AI to explain a command
      ```

  command:
    history:
      title: "📚 History Command"
      description: "Display or manipulate command history"
      usage: "history [options] [n]"
      options:
        - ["--help, -h", "Show this help message"]
        - ["-c", "Clear the history list by deleting all entries"]
        - ["-d offset", "Delete the history entry at position offset"]
        - ["n", "Show only the last n commands"]
      examples:
        - "history              # Show all command history"
        - "history 10           # Show last 10 commands"
        - "history -c           # Clear all history"
        - "history -d 5         # Delete history entry at position 5"
        - "history --help       # Show this help message"
      notes: "History entries are automatically recorded for all executed commands and AI interactions."

    cd:
      title: "📁 Change Directory"
      description: "Change the current working directory with full parameter support"
      usage: "cd [-L|[-P [-e]]] [directory]"
      options:
        - ["-L", "Force symbolic links to be followed: resolve symbolic links after processing '..' instances (default)"]
        - ["-P", "Use physical directory structure without following symbolic links: resolve symbolic links before processing '..' instances"]
        - ["-e", "If -P option is provided and current working directory cannot be determined, exit with non-zero status"]
        # - ["-@", "On systems that support it, present files with extended attributes as directories containing file attributes"]
        - ["directory", "Target directory path (optional, defaults to home directory)"]
        - ["-", "Return to previous directory"]
      examples:
        - "cd ~                 # Switch to home directory"
        - "cd /tmp              # Switch to /tmp directory"
        - "cd -                 # Return to previous directory"
        - "cd \"path with spaces\" # Use quotes for paths with spaces"
        - "cd -P /tmp           # Use physical path resolution"
        - "cd -P -e /tmp        # Use physical path resolution, exit on error"
        - "cd -L /tmp           # Force following symbolic links (default behavior)"
        # - "cd -@ /tmp           # Show extended attributes (if supported)"
      notes: "Supports tab completion and handling of paths with special characters. Default behavior follows symbolic links (-L)."

    pushd:
      title: "📤 Push Directory"
      description: "Push directory onto stack and change to it"
      usage: "pushd [directory]"
      options:
        - ["directory", "Target directory path"]
        - ["(no args)", "Swap top two directories on stack"]
      examples:
        - "pushd /tmp           # Push current dir to stack, go to /tmp"
        - "pushd                # Swap between current and previous directory"
      notes: "Maintains a directory stack for easy navigation between multiple directories."

    popd:
      title: "📥 Pop Directory"
      description: "Pop directory from stack and change to it"
      usage: "popd"
      options: []
      examples:
        - "popd                 # Return to previous directory from stack"
      notes: "Removes the top directory from the stack and changes to it."

    dirs:
      title: "📋 Show Directory Stack"
      description: "Display the directory stack"
      usage: "dirs [-c]"
      options:
        - ["-c", "Clear the directory stack"]
      examples:
        - "dirs                 # Show current directory stack"
        - "dirs -c              # Clear directory stack"
      notes: "Shows all directories currently on the navigation stack."

    help:
      title: "❓ Help Command"
      description: "Show available commands and features"
      usage: "help"
      options: []
      examples:
        - "help                 # Show general help information"
      notes: "Provides overview of all available commands and shell features."

    clear:
      title: "🧹 Clear Screen"
      description: "Clear the terminal screen"
      usage: "clear"
      options: []
      examples:
        - "clear                # Clear the terminal screen"
      notes: "Equivalent to the standard Unix clear command."

    exit:
      title: "🚪 Exit Shell"
      description: "Exit the AI Shell"
      usage: "exit"
      options: []
      examples:
        - "exit                 # Exit the shell"
        - "quit                 # Alternative way to exit"
      notes: "Cleanly exits the shell, preserving session data."

    export:
      title: "🔧 Export Environment Variables"
      description: "Set or display environment variables with export attributes"
      usage: "export [-fn] [name[=value] ...]\nexport -p"
      options:
        - ["-f", "Name refers to a shell function (not supported)"]
        - ["-n", "Remove export attribute from each name"]
        - ["-p", "Display list of all exported variables"]
        - ["--", "Disable further option processing"]
      examples:
        - "export PATH=/usr/local/bin:$PATH"
        - "export EDITOR=vim"
        - "export -n VAR  # Remove export attribute from VAR"
        - "export -p      # Display all exported variables"
        - "export JAVA_HOME=\"/usr/lib/jvm/java-11-openjdk\""
        - "export -- -VAR  # Set variable named -VAR"
      notes: "Environment variables set with export are passed to child processes."

    unset:
      title: "🗑️ Unset Environment Variables"
      description: "Unset shell variables and functions"
      usage: "unset [-f] [-v] [-n] [name ...]"
      options:
        - ["-f", "Each name refers to a shell function (not supported)"]
        - ["-v", "Each name refers to a shell variable (default)"]
        - ["-n", "Each name refers to a name reference (not supported)"]
        - ["--", "Disable further option processing"]
      examples:
        - "unset TEMP_VAR"
        - "unset -v VAR1 VAR2"
        - "unset JAVA_HOME"
        - "unset -- -VAR  # Unset variable named -VAR"
      notes: "Removes variables from the shell environment. Variables that don't exist are ignored."

    pwd:
      title: "📍 Print Working Directory"
      description: "Print the current working directory with symlink handling"
      usage: "pwd [-L|-P]"
      options:
        - ["-L", "Show logical path (follow symlinks, default)"]
        - ["-P", "Show physical path (resolve symlinks)"]
      examples:
        - "pwd                  # Show logical current directory"
        - "pwd -L               # Show logical path (respect symlinks)"
        - "pwd -P               # Show physical path (resolve symlinks)"
      notes: "Default behavior shows logical path that respects symbolic links."

    ";":
      title: "🤖 AI Assistant"
      description: "Ask the AI assistant a question"
      usage: "; <question>"
      options:
        - ["question", "Your question for the AI assistant"]
      examples:
        - "; how do I find large files?"
        - "; explain this command: ls -la"
        - "; suggest a better way to compress files"
      notes: "The AI assistant can help with command explanations, suggestions, and general shell usage."

    "；":
      title: "🤖 AI Assistant"
      description: "Ask the AI assistant a question"
      usage: "； <question>"
      options:
        - ["question", "Your question for the AI assistant"]
      examples:
        - "； how do I find large files?"
        - "； explain this command: ls -la"
        - "； suggest a better way to compress files"
      notes: "The AI assistant can help with command explanations, suggestions, and general shell usage."

    "/model":
      title: "🧠 model Switch Model"
      description: "Show the current model or switch to a specified model"
      usage: "/model [model]"
      options:
        - ["model", "Target model identifier (validated for tool-call support)"]
        - ["--help, -h", "Show this help message"]
      examples:
        - "/model               # Show current model"
        - "/model gpt-4         # Switch to a model"
        - "/model --help        # Show help"
      notes: "Switching validates connectivity and tool-call support; failures keep the current model."

    "/setup":
      title: "⚙️ setup Reconfigure"
      description: "Re-run the interactive setup wizard to change API settings (provider, API key, model)"
      usage: "/setup"
      options:
        - ["--help, -h", "Show this help message"]
      examples:
        - "/setup               # Launch setup wizard"
        - "/setup --help        # Show help"
      notes: "New settings are applied immediately without restart. Cancelling keeps current configuration."

