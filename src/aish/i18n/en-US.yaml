shell:
  welcome_title: "🚀 AI Shell"
  welcome_markdown: |
    Welcome to the AI Shell! A true shell with full PTY support and built-in LLM capabilities.

    ## Key Features:
    - 🔧 **Full Shell Compatibility**: Run any binary program with complete PTY support
    - 🤖 **AI Integration**: Built-in LLM assistant for help and suggestions
    - 📊 **Rich Output**: Beautiful terminal interface with Rich library
    - 📝 **Smart History**: Command history integrated with AI context

    ## Quick Start:
    - Use any shell command normally: `ls`, `top`, `vim`, `ssh`, etc.
    - Ask AI questions: Start with ; (e.g., `; how to find large files`)
    - Type `help` for more information

    Start your enhanced shell experience now!

  welcome2:
    header: ">_ AI Shell {version}"
    model_hint: "(type /model to switch)"
    label:
      version: "version"
