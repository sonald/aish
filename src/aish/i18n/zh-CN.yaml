      cmd_vim: "vim"
      cmd_ssh: "ssh"
      item1_suffix: " 等"
      item2_prefix: "向 AI 提问："
      item2_example: "以 `;` 开头提问（如：; 如何查找大文件？）"
      item3_prefix: "获取帮助："
