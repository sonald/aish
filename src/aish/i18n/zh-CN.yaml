help:
  labels:
    usage: "用法"
    options: "选项"
    examples: "示例"
    notes: "说明"
    brief_usage: "用法：{usage}"

  general:
    title: "📖 AI Shell 帮助"
    markdown: |-
      ## 可用命令：

      ### 目录导航
      - `cd [-L|[-P [-e]]] [directory]` - 切换目录（完整参数支持）
      - `pushd [directory]` - 将目录压入栈并切换
      - `popd` - 弹出目录栈并切换
      - `dirs [-c]` - 显示目录栈

      ### 历史管理
      - `history [options] [n]` - 查看命令历史
      - `history -c` - 清空历史
      - `history -d offset` - 删除指定位置的历史条目

      ### 环境变量
      - `export [-fn] [name[=value] ...]` - 设置/导出环境变量
      - `export -p` - 显示所有已导出的变量
      - `unset [-fv] [name ...]` - 取消设置环境变量
      - `pwd [-L|-P]` - 显示当前工作目录

      ### 通用命令
      - `help` - 显示本帮助
      - `clear` - 清屏
      - `exit` - 退出 shell
      - `/model [模型名称]` - 查看或切换模型
      - `/setup` - 重新配置 API 设置

      ### AI 命令
      - `； <question>` - 向 AI 助手提问

      ### 功能特性
      - ✅ 所有命令完整 PTY 支持
      - ✅ 命令历史与 AI 上下文融合
      - ✅ AI 输出 Rich 美化
      - ✅ 信号处理与优雅退出

      ### 获取更多帮助
      对任意命令使用 `<command> --help` 或 `<command> -h` 查看详细帮助。

      ### 示例
      ```bash
      history --help       # 查看 history 的详细帮助
      cd --help            # 查看 cd 的详细帮助
      export JAVA_HOME="/usr/lib/jvm/java-11"  # 设置环境变量
      unset TEMP_VAR       # 删除环境变量
      ； explain ls -la     # 让 AI 解释命令
      ```

  command:
    history:
      title: "📚 history 命令"
      description: "显示或管理命令历史"
      usage: "history [options] [n]"
      options:
        - ["--help, -h", "显示本帮助信息"]
        - ["-c", "删除所有条目并清空历史列表"]
        - ["-d offset", "删除指定位置 offset 的历史条目"]
        - ["n", "仅显示最近 n 条命令"]
      examples:
        - "history              # 显示全部命令历史"
        - "history 10           # 显示最近 10 条命令"
        - "history -c           # 清空历史"
        - "history -d 5         # 删除第 5 条历史"
        - "history --help       # 显示本帮助信息"
      notes: "所有已执行命令与 AI 交互都会自动记录到历史中。"

    cd:
      title: "📁 cd 切换目录"
      description: "切换当前工作目录（完整参数支持）"
      usage: "cd [-L|[-P [-e]]] [directory]"
      options:
        - ["-L", "强制跟随符号链接：在处理 '..' 后再解析符号链接（默认）"]
        - ["-P", "使用物理目录结构：在处理 '..' 前解析符号链接"]
        - ["-e", "当指定 -P 且无法确定当前目录时，以非 0 状态退出"]
        # - ["-@", "在支持的系统上，将带扩展属性的文件视为包含属性的目录"]
        - ["directory", "目标目录路径（可选，默认回到 home 目录）"]
        - ["-", "返回上一个目录"]
      examples:
        - "cd ~                 # 切换到 home 目录"
        - "cd /tmp              # 切换到 /tmp"
        - "cd -                 # 返回上一个目录"
        - "cd \"path with spaces\" # 路径含空格时使用引号"
        - "cd -P /tmp           # 使用物理路径解析"
        - "cd -P -e /tmp        # 使用物理路径解析，出错则退出"
        - "cd -L /tmp           # 强制跟随符号链接（默认行为）"
        # - "cd -@ /tmp           # 显示扩展属性（若支持）"
      notes: "支持 tab 补全与特殊字符路径处理；默认行为为 -L（跟随符号链接）。"

    pushd:
      title: "📤 pushd 目录入栈"
      description: "将目录压入栈并切换到该目录"
      usage: "pushd [directory]"
      options:
        - ["directory", "目标目录路径"]
        - ["(no args)", "交换目录栈顶的两个目录"]
      examples:
        - "pushd /tmp           # 将当前目录入栈并切换到 /tmp"
        - "pushd                # 在当前目录与上一个目录间切换"
      notes: "维护目录栈，便于在多个目录间快速切换。"

    popd:
      title: "📥 popd 目录出栈"
      description: "弹出目录栈并切换到该目录"
      usage: "popd"
      options: []
      examples:
        - "popd                 # 从目录栈返回上一个目录"
      notes: "移除目录栈顶目录并切换到新的栈顶目录。"

    dirs:
      title: "📋 dirs 显示目录栈"
      description: "显示当前目录栈"
      usage: "dirs [-c]"
      options:
        - ["-c", "清空目录栈"]
      examples:
        - "dirs                 # 显示当前目录栈"
        - "dirs -c              # 清空目录栈"
      notes: "显示当前导航目录栈中的所有目录。"

    help:
      title: "❓ help 帮助"
      description: "显示可用命令与功能概览"
      usage: "help"
      options: []
      examples:
        - "help                 # 显示通用帮助信息"
      notes: "提供所有可用命令与 shell 功能的概览。"

    clear:
      title: "🧹 clear 清屏"
      description: "清空终端屏幕"
      usage: "clear"
      options: []
      examples:
        - "clear                # 清空终端屏幕"
      notes: "等同于标准 Unix 的 clear 命令。"

    exit:
      title: "🚪 exit 退出"
      description: "退出 AI Shell"
      usage: "exit"
      options: []
      examples:
        - "exit                 # 退出 shell"
        - "quit                 # 也可以用 quit 退出"
      notes: "将会干净地退出 shell，并保留会话数据。"

    export:
      title: "🔧 export 导出环境变量"
      description: "设置或显示带 export 属性的环境变量"
      usage: "export [-fn] [name[=value] ...]\nexport -p"
      options:
        - ["-f", "名称指向 shell 函数（不支持）"]
        - ["-n", "移除每个名称的 export 属性"]
        - ["-p", "显示所有已导出的变量"]
        - ["--", "停止进一步的选项处理"]
      examples:
        - "export PATH=/usr/local/bin:$PATH"
        - "export EDITOR=vim"
        - "export -n VAR  # 移除 VAR 的 export 属性"
        - "export -p      # 显示所有已导出的变量"
        - "export JAVA_HOME=\"/usr/lib/jvm/java-11-openjdk\""
        - "export -- -VAR  # 设置名为 -VAR 的变量"
      notes: "通过 export 设置的环境变量会传递给子进程。"

    unset:
      title: "🗑️ unset 取消变量"
      description: "取消设置 shell 变量与函数"
      usage: "unset [-f] [-v] [-n] [name ...]"
      options:
        - ["-f", "名称指向 shell 函数（不支持）"]
        - ["-v", "名称指向 shell 变量（默认）"]
        - ["-n", "名称指向 name reference（不支持）"]
        - ["--", "停止进一步的选项处理"]
      examples:
        - "unset TEMP_VAR"
        - "unset -v VAR1 VAR2"
        - "unset JAVA_HOME"
        - "unset -- -VAR  # 取消名为 -VAR 的变量"
      notes: "从 shell 环境中移除变量；不存在的变量会被忽略。"

    pwd:
      title: "📍 pwd 显示当前目录"
      description: "显示当前工作目录（支持符号链接处理）"
      usage: "pwd [-L|-P]"
      options:
        - ["-L", "显示逻辑路径（跟随符号链接，默认）"]
        - ["-P", "显示物理路径（解析符号链接）"]
      examples:
        - "pwd                  # 显示逻辑当前目录"
        - "pwd -L               # 显示逻辑路径（遵循符号链接）"
        - "pwd -P               # 显示物理路径（解析符号链接）"
      notes: "默认行为显示逻辑路径，并尊重符号链接。"

    ";":
      title: "🤖 AI 助手"
      description: "向 AI 助手提问"
      usage: "; <question>"
      options:
        - ["question", "你要问 AI 的问题"]
      examples:
        - "; 如何查找大文件？"
        - "; 解释这个命令：ls -la"
        - "; 有什么更好的方式压缩文件？"
      notes: "AI 助手可用于命令解释、建议以及一般的 shell 使用帮助。"

    "；":
      title: "🤖 AI 助手"
      description: "向 AI 助手提问"
      usage: "； <question>"
      options:
        - ["question", "你要问 AI 的问题"]
      examples:
        - "； 如何查找大文件？"
        - "； 解释这个命令：ls -la"
        - "； 有什么更好的方式压缩文件？"
      notes: "AI 助手可用于命令解释、建议以及一般的 shell 使用帮助。"

    "/model":
      title: "🧠 model 切换模型"
      description: "显示当前模型或切换到指定模型"
      usage: "/model [模型名称]"
      options:
        - ["模型名称", "要切换到的模型标识（会进行 tool-call 能力验证）"]
        - ["--help, -h", "显示本帮助信息"]
      examples:
        - "/model               # 显示当前模型"
        - "/model gpt-4         # 切换到指定模型"
        - "/model --help        # 显示帮助"
      notes: "切换会进行连通性与工具调用能力验证；失败则不会切换。"

    "/setup":
      title: "⚙️ setup 重新配置"
      description: "重新运行交互式配置向导，更改 API 设置（Provider、API Key、模型）"
      usage: "/setup"
      options:
        - ["--help, -h", "显示本帮助信息"]
      examples:
        - "/setup               # 启动配置向导"
        - "/setup --help        # 显示帮助"
      notes: "配置完成后会自动应用新设置，无需重启。取消则保持当前配置不变。"

errors:
  litellm_not_installed: "litellm 模块未安装"
