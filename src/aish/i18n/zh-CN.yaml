shell:
  welcome_title: "🚀 AI Shell"
  welcome_markdown: |
    欢迎使用 AI Shell！这是一个具备完整 PTY 支持并内置大模型能力的真正 Shell。

    ## 主要特性：
    - 🔧 **完整 Shell 兼容**：完整 PTY 支持，可运行任意二进制程序
    - 🤖 **AI 集成**：内置大模型助手，用于帮助与建议
    - 📊 **Rich 输出**：基于 Rich 的美观终端界面
    - 📝 **智能历史**：命令历史与 AI 上下文融合

    ## 快速开始：
    - 像普通 Shell 一样使用：`ls`、`top`、`vim`、`ssh` 等
    - 向 AI 提问：以 `;` 开头提问（如：`; 如何查找大文件？`）
    - 输入 `help` 查看更多信息

    立即开始你的增强式 Shell 体验！

